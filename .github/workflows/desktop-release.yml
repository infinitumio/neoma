# SPDX-License-Identifier: AGPL-3.0-or-later
# Tag-driven DESKTOP releases: build Tauri installers for Windows/macOS/Linux,
# publish them with SHA-256 checksums. Runs only for `desktop-v*` tags so it is
# independent of the PWA release. NOTE: installers are currently UNSIGNED — see
# INSTALL.md for the honest explanation shown to users.
name: Desktop release

on:
  push:
    tags:
      - 'desktop-v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rustTargets: x86_64-pc-windows-msvc
          - os: macos-latest
            # universal-apple-darwin is a Tauri meta-target (lipo of both
            # arches); rustup installs the two real targets below.
            target: universal-apple-darwin
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rustTargets: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci # @tauri-apps/cli and the icon set are committed to the repo

      - name: Build desktop app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization. Empty (unsigned) until these repo
          # secrets are set; see DESKTOP.md § Signing. Only used on the macOS
          # runner — ignored on Windows/Linux.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # All three matrix jobs publish to the same tagged release; the action
          # creates it once and appends each platform's installers.
          tagName: ${{ github.ref_name }}
          releaseName: Neoma ${{ github.ref_name }}
          releaseBody: |
            Neoma desktop builds (macOS `.dmg`, Windows `.exe`, Linux `.AppImage`/`.deb`).

            These installers are **unsigned** — your OS may show an "unidentified
            developer" warning. Verify the SHA-256 checksums and see the install
            guide before running: https://github.com/infinitumio/neoma/blob/main/INSTALL.md
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      - name: Compute SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          root="src-tauri/target"
          [ -d "$root/${{ matrix.target }}/release/bundle" ] && \
            base="$root/${{ matrix.target }}/release/bundle" || base="$root/release/bundle"
          : > SHA256SUMS-${{ matrix.target }}.txt
          find "$base" -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \) \
            -print0 | while IFS= read -r -d '' f; do
              if command -v sha256sum >/dev/null; then sha256sum "$f"; else shasum -a 256 "$f"; fi \
                | sed "s#$base/##" >> SHA256SUMS-${{ matrix.target }}.txt
            done
          cat SHA256SUMS-${{ matrix.target }}.txt

      - name: Upload checksums (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: SHA256SUMS-${{ matrix.target }}.txt

      - name: Attach checksums to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: SHA256SUMS-${{ matrix.target }}.txt
