# Tag-driven releases: verify, build, attach the static bundle to a GitHub release.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify
        run: |
          npm run typecheck
          npm run lint
          npm test
      - name: Build
        run: npm run build
      - name: Package
        run: |
          cd dist
          zip -r ../neoma-${{ github.ref_name }}.zip .
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true
          files: neoma-${{ github.ref_name }}.zip
          body: |
            Static production build of neoma ${{ github.ref_name }}.

            Unzip and serve with any static file server, or use the Dockerfile in the
            repository. See CHANGELOG.md for details.
